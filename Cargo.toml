[package]
name = "navpipe"
version = "0.1.4"
edition = "2021"
authors = ["Satya M <manaswi.m02@gmail.com>"]
description = "Unofficial Python SDK for fetching mutual fund NAV history from mfapi.in (Rust backend)"
license = "Apache-2.0"
readme = "docs/README_PyPI.md"
keywords = ["mutual fund", "NAV", "mfapi", "finance", "polars", "asyncio"]
repository = "https://github.com/MSM2002/navpipe"

# Build for Python
[lib]
name = "navpipe"
crate-type = ["cdylib"]

[dependencies]
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures = "0.3"
anyhow = "1"
polars = { version = "0.53", features = ["lazy", "temporal", "diagonal_concat"] }
pyo3 = { version = "0.27", features = ["extension-module"] }
pyo3-polars = "0.26"  

[features]
python = ["pyo3/extension-module"]

[package.metadata.maturin]
name = "navpipe"
bindings = "pyo3"
