name: Publish to PyPI

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            python-versions: |
              3.8
              3.9
              3.10
              3.11
              3.12
              3.13
              3.14
          - os: ubuntu-24.04-arm
            target: aarch64
            # We flag this here, but don't map it to env yet
            needs_asm: true
            python-versions: |
              3.8
              3.9
              3.10
              3.11
              3.12
              3.13
              3.14
          - os: windows-latest
            target: x64
            python-versions: |
              3.8
              3.9
              3.10
              3.11
              3.12
              3.13
              3.14
          - os: windows-11-arm
            target: aarch64
            python-versions: |
              3.11
              3.12
              3.13
              3.14
          - os: macos-latest
            target: x86_64
            python-versions: |
              3.8
              3.9
              3.10
              3.11
              3.12
              3.13
              3.14
          - os: macos-latest
            target: aarch64
            python-versions: |
              3.8
              3.9
              3.10
              3.11
              3.12
              3.13
              3.14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Newline-separated string is the most robust format for multiple versions
          python-version: ${{ matrix.python-versions }}

      # FIX: Only inject RING_PREGENERATE_ASM for Linux ARM.
      # Windows/macOS never see this variable, so ring won't panic.
      - name: Configure Ring for ARM
        if: ${{ matrix.needs_asm }}
        shell: bash
        run: echo "RING_PREGENERATE_ASM=1" >> $GITHUB_ENV

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # maturin will find all installed CPython versions and build native wheels
          args: --release --out dist --find-interpreter
          sccache: "true"
          manylinux: auto
        env:
          RUSTFLAGS: "-C opt-level=3"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI and GitHub
    runs-on: ubuntu-latest
    needs: [build_wheels, sdist]
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Extract Release Notes
        run: |
          VERSION="${{ github.ref_name }}"
          sed -n "/## \[$VERSION\]/,/---/p" CHANGELOG.md | sed '1d;$d' > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_BODY.md
          files: dist/*
          # This prevents the action from failing if a specific glob doesn't find a file
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
