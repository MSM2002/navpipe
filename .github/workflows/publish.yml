name: Publish to PyPI

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            python-versions: "3.8\n3.9\n3.10\n3.11\n3.12\n3.13"
          - os: ubuntu-24.04-arm
            target: aarch64
            python-versions: "3.8\n3.9\n3.10\n3.11\n3.12\n3.13"
          - os: windows-latest
            target: x64
            python-versions: "3.8\n3.9\n3.10\n3.11\n3.12\n3.13"
          - os: windows-11-arm
            target: aarch64
            python-versions: "3.11\n3.12\n3.13"
          - os: macos-latest
            target: x86_64
            python-versions: "3.8\n3.9\n3.10\n3.11\n3.12\n3.13"
          - os: macos-latest
            target: aarch64
            python-versions: "3.8\n3.9\n3.10\n3.11\n3.12\n3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-versions }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # FIX: --abi3 is now the VERY FIRST argument.
          # No '--' separator is used so maturin handles it.
          args: >
            --abi3
            --release
            --out dist
            --find-interpreter
            --interpreter ${{ matrix.os == 'windows-11-arm' && 'python3.11 python3.12 python3.13' || 'python3.8 python3.9 python3.10 python3.11 python3.12 python3.13' }}
          sccache: "true"
          manylinux: auto
        env:
          RUSTFLAGS: "-C opt-level=3"
          # FIX: Only pregenerate ASM on Linux ARM to stop the Windows/Mac 'ring' panic
          RING_PREGENERATE_ASM: ${{ matrix.os == 'ubuntu-24.04-arm' && '1' || '0' }}
          MATURIN_FEATURES: "abi3"
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI and GitHub
    runs-on: ubuntu-latest
    needs: [build_wheels, sdist]
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Extract Release Notes
        id: extract_notes
        run: |
          VERSION="${{ github.ref_name }}"
          sed -n "/## \[$VERSION\]/,/---/p" CHANGELOG.md | sed '1d;$d' > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_BODY.md
          files: dist/*
          fail_on_unmatched_files: true
        env:
          # Note: Using standard GITHUB_TOKEN as it has permission 'contents: write'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
