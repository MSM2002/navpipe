name: Publish to PyPI

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64
          # Linux ARM64 (Native Runner)
          - os: ubuntu-24.04-arm
            target: aarch64
          # Windows x64
          - os: windows-latest
            target: x64
          # Windows ARM64 (Native Runner - Added 2026)
          - os: windows-11-arm
            target: aarch64
          # macOS Intel
          - os: macos-latest
            target: x86_64
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.8
            3.9
            3.10
            3.11
            3.12
            3.13

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # Logic: Optimized native wheels for 3.8-3.13.
          # The --abi3 flag creates the 'cp38-abi3' fallback for 3.14+.
          args: >
            --release
            --out dist
            --find-interpreter
            --interpreter python3.8 python3.9 python3.10 python3.11 python3.12 python3.13
            --abi3
          sccache: "true"
          manylinux: auto
        env:
          RUSTFLAGS: "-C opt-level=3"
          # Prevents 'ring' crate assembly errors across all architectures
          RING_PREGENERATE_ASM: "1"
          # Activates the [features] abi3 in your Cargo.toml
          MATURIN_FEATURES: "abi3"
          # Allows PyO3 0.22 to handle Python 3.14+ gracefully
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build_wheels, sdist]
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Extract Release Notes
        id: extract_notes
        run: |
          VERSION="${{ github.ref_name }}"
          sed -n "/## \[$VERSION\]/,/---/p" CHANGELOG.md | sed '1d;$d' > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_BODY.md
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
