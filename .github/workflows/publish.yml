name: Publish to PyPI

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            python-versions: "3.8,3.9,3.10,3.11,3.12,3.13,3.14"
          - os: ubuntu-24.04-arm
            target: aarch64
            python-versions: "3.8,3.9,3.10,3.11,3.12,3.13,3.14"
          - os: windows-latest
            target: x64
            python-versions: "3.8,3.9,3.10,3.11,3.12,3.13,3.14"
          - os: windows-11-arm
            target: aarch64
            python-versions: "3.11,3.12,3.13,3.14"
          - os: macos-latest
            target: x86_64
            python-versions: "3.8,3.9,3.10,3.11,3.12,3.13,3.14"
          - os: macos-latest
            target: aarch64
            python-versions: "3.8,3.9,3.10,3.11,3.12,3.13,3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-versions }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # We removed --abi3. Maturin will now build 100% native wheels
          # for each interpreter found in the path.
          args: >
            --release
            --out dist
            --find-interpreter
          sccache: "true"
          manylinux: auto
        env:
          RUSTFLAGS: "-C opt-level=3"
          # Disable this on Win/Mac to avoid the "AlreadyExists" ring panic
          RING_PREGENERATE_ASM: ${{ matrix.os == 'ubuntu-24.04-arm' && '1' || '0' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI and GitHub
    runs-on: ubuntu-latest
    needs: [build_wheels, sdist]
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Extract Release Notes
        run: |
          VERSION="${{ github.ref_name }}"
          sed -n "/## \[$VERSION\]/,/---/p" CHANGELOG.md | sed '1d;$d' > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_BODY.md
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
